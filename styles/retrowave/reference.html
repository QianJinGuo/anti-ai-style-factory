<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETROWAVE // SYSTEM TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* DESIGN.md Tokens */
            --color-primary: #ff00ff;
            --color-secondary: #00ffff;
            --color-tertiary: #ffff00;
            --color-neutral: #050510;
            --color-muted: #2d004d;
            --color-muted-light: #4b0082;
            
            /* Spacing & Layout */
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 32px;
            --spacing-xl: 64px;
            
            /* Typography */
            --font-h: "'VT323', 'Courier New', monospace";
            --font-b: "'Share Tech Mono', 'IBM Plex Mono', monospace";
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-neutral);
            color: var(--color-secondary);
            font-family: var(--font-b);
            font-size: 16px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            overflow-x: hidden;
            /* CRT Scanline effect */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        /* --- Utility Classes --- */
        .glow-text {
            text-shadow: 0 0 5px var(--color-primary), 0 0 10px var(--color-primary);
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(var(--color-muted) 1px, transparent 1px),
                linear-gradient(90deg, var(--color-muted) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center bottom;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            height: 300px;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) scale(2);
            transform-origin: bottom;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
            position: relative;
            z-index: 1;
        }

        /* --- 1. NAV --- */
        nav {
            border-bottom: 1px solid var(--color-primary);
            padding: var(--spacing-md) 0;
            background: rgba(5, 5, 16, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-h);
            font-size: 32px;
            color: var(--color-tertiary);
            text-shadow: 2px 2px 0px var(--color-muted-light);
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-lg);
        }

        .nav-links a {
            color: var(--color-secondary);
            text-decoration: none;
            font-family: var(--font-h);
            font-size: 24px;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-primary);
            text-shadow: 0 0 8px var(--color-primary);
        }

        /* --- 2. HERO --- */
        .hero {
            position: relative;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* The Retro Sun */
        .retro-sun {
            position: absolute;
            bottom: 15%;
            width: 400px;
            height: 400px;
            border-radius: 50%; /* Circle is standard for the sun, but kept sharp edges elsewhere */
            background: linear-gradient(to bottom, var(--color-tertiary), var(--color-primary), var(--color-muted));
            box-shadow: 0 0 40px var(--color-primary);
            z-index: -2;
        }

        /* Sun Stripes */
        .retro-sun::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0%,
                transparent 40%,
                var(--color-neutral) 40%,
                var(--color-neutral) 45%,
                transparent 45%,
                transparent 60%,
                var(--color-neutral) 60%,
                var(--color-neutral) 66%,
                transparent 66%,
                transparent 80%,
                var(--color-neutral) 80%,
                var(--color-neutral) 88%
            );
        }

        .hero h1 {
            font-family: var(--font-h);
            font-size: 64px;
            line-height: 1.1;
            letter-spacing: -2px;
            color: var(--color-neutral);
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            text-shadow: 
                2px 2px 0px var(--color-primary), 
                -2px -2px 0px var(--color-secondary);
            mix-blend-mode: hard-light;
        }

        .hero-sub {
            font-family: var(--font-b);
            font-size: 18px;
            color: var(--color-secondary);
            margin-top: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* --- 3. DASHBOARD --- */
        .section-title {
            font-family: var(--font-h);
            font-size: 32px;
            color: var(--color-primary);
            border-left: 4px solid var(--color-secondary);
            padding-left: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            text-transform: uppercase;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .metric-card {
            background: rgba(45, 0, 77, 0.3); /* Muted Purple low opacity */
            border: 1px solid var(--color-primary);
            padding: var(--spacing-lg);
            position: relative;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 10px;
            height: 10px;
            background: var(--color-secondary);
        }

        .metric-label {
            font-size: 12px;
            color: var(--color-secondary);
            text-transform: uppercase;
            margin-bottom: var(--spacing-sm);
        }

        .metric-value {
            font-family: var(--font-h);
            font-size: 48px;
            color: #fff;
            text-shadow: 0 0 10px var(--color-secondary);
        }

        .data-table-container {
            border: 1px solid var(--color-muted-light);
            padding: var(--spacing-md);
            background: rgba(5, 5, 16, 0.9);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-b);
        }

        th {
            text-align: left;
            color: var(--color-primary);
            border-bottom: 1px solid var(--color-primary);
            padding: var(--spacing-md);
            text-transform: uppercase;
            font-size: 14px;
        }

        td {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--color-muted);
            color: #e0e0e0;
        }

        tr:hover td {
            background: rgba(0, 255, 255, 0.1);
            color: var(--color-secondary);
        }

        /* --- 4. PALETTE --- */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .swatch {
            height: 120px;
            border: 1px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--spacing-sm);
            position: relative;
        }

        .swatch span {
            background: var(--color-neutral);
            padding: 2px 4px;
            font-size: 10px;
            color: #fff;
            text-transform: uppercase;
        }

        /* --- 5. COMPONENTS --- */
        .component-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .demo-card {
            background: rgba(5, 5, 16, 0.8);
            border: 1px solid var(--color-primary);
            /* Hard offset shadow as specified */
            box-shadow: 4px 4px 0px var(--color-muted); 
            padding: var(--spacing-lg);
        }

        .card-header {
            font-family: var(--font-h);
            font-size: 24px;
            color: var(--color-tertiary);
            margin-bottom: var(--spacing-md);
            border-bottom: 1px dashed var(--color-muted-light);
            padding-bottom: var(--spacing-sm);
        }

        .card-body {
            font-size: 14px;
            color: #ccc;
        }

        /* --- 6. FORM --- */
        .form-section {
            border: 1px solid var(--color-secondary);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            background: rgba(0, 255, 255, 0.02);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            color: var(--color-secondary);
            margin-bottom: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            background: transparent;
            border: 1px solid var(--color-muted-light);
            border-bottom: 2px solid var(--color-primary); /* Retro style bottom focus */
            color: var(--color-secondary);
            font-family: var(--font-b);
            padding: var(--spacing-sm);
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--color-secondary);
            box-shadow: 0 0 10px var(--color-secondary);
        }

        select {
            cursor: pointer;
        }
        
        /* Custom arrow for select */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300ffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7em top 50%;
            background-size: .65em auto;
        }

        /* Buttons */
        .btn {
            background: transparent;
            border: 2px solid var(--color-secondary);
            color: var(--color-secondary);
            font-family: var(--font-h);
            font-size: 24px;
            padding: 12px 32px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            align-self: flex-end;
            margin-top: var(--spacing-md);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--color-secondary);
            color: var(--color-neutral);
            box-shadow: 0 0 20px var(--color-secondary);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* --- Footer --- */
        footer {
            border-top: 1px solid var(--color-primary);
            padding: var(--spacing-lg) 0;
            text-align: center;
            font-size: 12px;
            color: var(--color-muted-light);
        }
    </style>
</head>
<body>

    <!-- 1. NAV -->
    <nav>
        <div class="container nav-inner">
            <div class="logo">SYSTEM_V1.0</div>
            <div class="nav-links">
                <a href="#">DASHBOARD</a>
                <a href="#">PROTOCOLS</a>
                <a
