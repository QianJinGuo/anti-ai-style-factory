Here is the single-file reference implementation for the "Vaporwave" (蒸汽波) style, strictly adhering to the design principles and anti-AI constraints.

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-TOKYO / SYSTEM_3000</title>
    <style>
        /* IMPORTS */
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Montserrat:wght@800&family=Cinzel:wght@700&display=swap');

        /* TOKENS */
        :root {
            --bg-deep: #1A1A2E;
            --bg-grid: #252540;
            --neon-pink: #FF71CE;
            --neon-cyan: #01S1F1;
            --neon-purple: #B967FF;
            --marble-white: #F4F4F4;
            --terminal-green: #00FF41;
            --font-display: 'Cinzel', serif;
            --font-tech: 'VT323', monospace;
            --font-body: 'Montserrat', sans-serif;
        }

        /* RESET & BASE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--marble-white);
            font-family: var(--font-tech);
            font-size: 20px;
            line-height: 1.4;
            overflow-x: hidden;
            position: relative;
        }

        /* SCANLINE OVERLAY (CRT EFFECT) */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* UTILITIES */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .checkerboard {
            background-image:
                linear-gradient(45deg, var(--bg-grid) 25%, transparent 25%),
                linear-gradient(-45deg, var(--bg-grid) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--bg-grid) 75%),
                linear-gradient(-45deg, transparent 75%, var(--bg-grid) 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            text-transform: uppercase;
            font-weight: normal;
        }

        /* 1. NAVIGATION */
        nav {
            border-bottom: 2px solid var(--neon-cyan);
            padding: 20px 0;
            background: rgba(26, 26, 46, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--neon-pink);
            text-shadow: 2px 2px 0px var(--neon-cyan);
            letter-spacing: 4px;
        }

        .nav-links a {
            color: var(--marble-white);
            text-decoration: none;
            margin-left: 30px;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--neon-pink);
            text-decoration: line-through;
        }

        /* 2. HERO SECTION */
        .hero {
            padding: 100px 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid var(--neon-purple);
            position: relative;
        }

        .hero-text {
            width: 60%;
            z-index: 2;
        }

        .hero h1 {
            font-size: 5rem;
            line-height: 0.9;
            margin-bottom: 20px;
            color: var(--neon-cyan);
            text-shadow: 4px 4px 0px var(--bg-deep);
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: var(--neon-purple);
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            font-family: var(--font-tech);
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--neon-pink);
            color: var(--bg-deep);
            box-shadow: 2px 2px 0px var(--neon-cyan);
            transform: translate(2px, 2px);
        }

        /* CSS ONLY STATUE (Abstract representation) */
        .statue-placeholder {
            width: 300px;
            height: 400px;
            background: #e0e0e0;
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
            position: relative;
            opacity: 0.8;
            mix-blend-mode: luminosity;
        }
        
        .statue-placeholder::before {
            content: "BUST_01";
            position: absolute;
            bottom: -40px;
            right: 0;
            font-family: var(--font-tech);
            color: var(--neon-pink);
        }

        /* 3. DASHBOARD */
        .dashboard {
            padding: 80px 0;
        }

        .section-header {
            margin-bottom: 40px;
            border-left: 5px solid var(--neon-pink);
            padding-left: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-deep);
            border: 1px solid var(--neon-cyan);
            padding: 20px;
            position: relative;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 100%;
            height: 100%;
            border: 1px solid var(--neon-cyan);
            z-index: -1;
        }

        .metric-label {
            color: var(--neon-purple);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 3rem;
            color: var(--neon-pink);
            font-family: var(--font-tech);
        }

        /* DATA TABLE */
        .data-table-wrapper {
            border: 1px solid var(--neon-cyan);
            background: rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-tech);
            font-size: 1.2rem;
        }

        th {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            text-align: left;
            padding: 10px;
            text-transform: uppercase;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--neon-purple);
            color: var(--marble-white);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(1, 209, 241, 0.1);
        }

        /* 4. PALETTE */
        .palette-section {
            padding: 80px 0;
            background: var(--neon-purple);
        }

        .swatch-container {
            display: flex;
            gap: 20px;
        }

        .swatch {
            width: 150px;
            height: 150px;
            border: 2px solid var(--bg-deep);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
            font-size: 0.9rem;
            color: var(--bg-deep);
            font-weight: bold;
        }

        /* 5. COMPONENTS */
        .components {
            padding: 80px 0;
        }

        .comp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .panel {
            border: 1px solid var(--neon-pink);
            padding: 20px;
            position: relative;
        }

        .panel-title {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--bg-deep);
            padding: 0 10px;
            color: var(--neon-pink);
            font-family: var(--font-tech);
        }

        .marquee {
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid var(--neon-cyan);
            padding: 10px 0;
            margin-top: 20px;
        }

        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 10s linear infinite;
            color: var(--neon-cyan);
        }

        @keyframes scroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 6. FORM */
        .form-section {
            padding: 80px 0;
            border-top: 1px solid var(--neon-pink);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 800px;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-cyan);
            font-family: var(--font-tech);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--marble-white);
            padding: 15px;
            font-family: var(--font-tech);
            font-size: 1.2rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--neon-pink);
            background: rgba(185, 103, 255, 0.1);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23B967FF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7em top 50%;
            background-size: .65em auto;
        }

        .submit-btn {
            width: 100%;
            background: var(--neon-pink);
            color: var(--bg-deep);
            border: none;
            padding: 20px;
            font-family: var(--font-tech);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--neon-cyan);
            transition: transform 0.1s;
        }

        .submit-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--neon-cyan);
        }

        /* DECORATIVE ELEMENTS */
        .deco-line {
            position: absolute;
            background: var(--neon-cyan);
            z-index: 0;
        }
        .h-line { height: 1px; width: 100%; top: 50%; }
        .v-line { width: 1px; height: 100%; left: 50%; }

    </style>
</head>
