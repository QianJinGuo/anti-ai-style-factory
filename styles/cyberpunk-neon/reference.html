        /* --- DESIGN TOKENS --- */
        :root {
            /* Colors */
            --color-primary: #FF00FF;
            --color-secondary: #00FFFF;
            --color-tertiary: #FFFF00;
            --color-neutral: #121212;
            --color-muted: #2A2A2A;
            --color-accent: #FF3333;

            --space-sm: 4px;

            --font-main: 'Share Tech Mono', 'Courier New', monospace;

            --radius-none: 0px;

        /* --- RESET & BASE --- */
        * {

            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-background);

            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3, h4 {

            text-transform: uppercase;

            color: var(--color-primary);

        }

        h3 {
            font-size: 1.5rem;
            line-height: 1.3;
            letter-spacing: 0.05em;
            color: var(--color-text-main);
            margin-bottom: var(--space-md);
        }

        p {
            margin-bottom: var(--space-lg);
            max-width: 65ch;
        }

        .caption {
            font-size: 0.75rem;
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-dim);
        }

        code {
            font-family: var(--font-code);
            font-size: 0.875rem;
            color: var(--color-tertiary);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 4px;
        }

        /* --- LAYOUT UTILS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }

        .grid-3 {
            display: grid;

            gap: var(--space-xl);
        }

        }

        /* --- NAVIGATION --- */
        nav {

            padding: var(--space-md) 0;
            position: sticky;
            top: 0;
            z-index: 100;

        .nav-inner {

            justify-content: space-between;
            align-items: center;

        .logo {

            gap: var(--space-xl);

            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.1s ease;

        .status-indicator {

        .data-status {
            font-family: var(--font-code);

        .status-ok { color: var(--color-success); }
        .status-warn { color: var(--color-tertiary); }
        .status-err { color: var(--color-accent); }

            gap: var(--space-lg);

        .swatch {
            height: 100px;
            border: 1px solid var(--color-muted);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-sm);

        .swatch-info {
            background: rgba(0,0,0,0.8);

            position: relative;
            overflow: hidden;
            height: 100%;

            background: var(--color-secondary);

            border-bottom: 1px solid var(--color-muted);
            padding-bottom: var(--space-md);

        }

        .card-body {
            font-size: 0.875rem;
            color: var(--color-text-main);
