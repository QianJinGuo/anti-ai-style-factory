<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cathedral of Industry: High Gothic Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <style>
        /* 
         * DESIGN SYSTEM: GOTHIC CATHEDRAL
         * Philosophy: Verticality, Structural Honesty, Material Weight.
         * No floating elements. No soft shadows.
         */

        :root {
            /* Colors */
            --color-primary: #E8E4D9;      /* Limestone */
            --color-secondary: #1A2B4C;    /* Deep Lapis */
            --color-tertiary: #C5A059;     /* Gold Leaf */
            --color-neutral: #2C2C2C;      /* Charcoal Mortar */
            --color-muted: #9A958A;        /* Faded Fresco */
            --color-stone-dark: #E0DCD1;   /* Weathered Stone */

            /* Spacing */
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 32px;
            --space-xl: 64px;

            /* Borders */
            --border-thick: 2px solid var(--color-neutral);
            --border-gold: 2px solid var(--color-tertiary);
            --border-thin: 1px solid var(--color-muted);

            /* Shadows: Hard offsets only. No blur. */
            --shadow-hard: 4px 4px 0px var(--color-neutral);
            --shadow-hard-sm: 2px 2px 0px var(--color-neutral);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-primary);
            color: var(--color-neutral);
            font-family: 'Libre Baskerville', serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            font-size: 16px;
        }

        /* TYPOGRAPHY */
        h1, h2, h3 {
            font-weight: 400;
            color: var(--color-secondary);
            margin-top: 0;
        }

        h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 3.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: var(--space-md);
        }

        h2 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 2.5rem;
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin-bottom: var(--space-lg);
            border-bottom: var(--border-gold);
            padding-bottom: var(--space-sm);
            display: inline-block;
        }

        h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: var(--space-md);
        }

        p {
            margin-bottom: var(--space-md);
            max-width: 70ch; /* Optimal reading width */
        }

        .caption {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-muted);
            display: block;
            margin-bottom: var(--space-sm);
        }

        /* LAYOUT UTILITIES */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .section {
            padding: var(--space-xl) 0;
            border-bottom: var(--border-thin);
        }

        .grid-12 {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--space-lg);
        }

        /* NAVIGATION */
        nav {
            background-color: var(--color-secondary);
            border-bottom: var(--border-gold);
            padding: var(--space-md) 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-family: 'UnifrakturMaguntia', cursive;
            color: var(--color-tertiary);
            font-size: 1.8rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: var(--space-lg);
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            font-family: 'Cinzel', serif;
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-link.active {
            color: var(--color-tertiary);
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background-color: var(--color-tertiary);
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: var(--space-xl) 0;
            background-color: var(--color-primary);
            /* Simulating stained glass light effect via subtle texture */
            background-image: radial-gradient(circle at center, transparent 0%, var(--color-primary) 100%);
        }

        .hero-subtitle {
            font-family: 'Cinzel', serif;
            color: var(--color-muted);
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            margin-bottom: var(--space-lg);
            text-transform: uppercase;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            background-color: var(--color-secondary);
            color: var(--color-tertiary);
            border: 2px solid var(--color-tertiary);
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 12px 24px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-hard-sm);
            /* No border radius specified in design, keeping 0 */
            border-radius: 0; 
        }

        .btn:hover {
            background-color: var(--color-tertiary);
            color: var(--color-secondary);
            box-shadow: var(--shadow-hard);
            transform: translate(-2px, -2px);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* DASHBOARD & METRICS */
        .metric-card {
            grid-column: span 4;
            background-color: var(--color-primary);
            border: var(--border-thick);
            padding: var(--space-md);
            position: relative;
            box-shadow: var(--shadow-hard);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .metric-card::after {
            /* Decorative corner bracket */
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--color-tertiary);
            border-right: 2px solid var(--color-tertiary);
        }

        .metric-value {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 3rem;
            color: var(--color-secondary);
            line-height: 1;
            margin: var(--space-sm) 0;
        }

        .metric-label {
            font-family: 'Cinzel', serif;
            color: var(--color-muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* DATA TABLE */
        .table-container {
            grid-column: span 12;
            margin-top: var(--space-lg);
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Libre Baskerville', serif;
        }

        thead {
            background-color: var(--color-secondary);
            color: var(--color-tertiary);
        }

        th {
            font-family: 'Cinzel', serif;
            text-align: left;
            padding: var(--space-md);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border-bottom: 2px solid var(--color-tertiary);
        }

        td {
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-stone-dark);
            color: var(--color-neutral);
        }

        tr:nth-child(even) {
            background-color: rgba(224, 220, 209, 0.4); /* Slightly darker stone */
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* PALETTE SECTION */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-md);
        }

        .swatch {
            border: var(--border-thick);
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-sm);
            box-shadow: var(--shadow-hard);
            position: relative;
        }

        .swatch-name {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 0 2px var(--color-primary);
        }

        .swatch-value {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            font-style: italic;
            margin-top: 4px;
        }

        /* COMPONENTS */
        .card {
            border: var(--border-thick);
            background-color: var(--color-primary);
            box-shadow: var(--shadow-hard);
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: var(--color-secondary);
            padding: var(--space-md);
            border-bottom: var(--border-thick);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            color: var(--color-primary);
            margin: 0;
            font-size: 1.2rem;
        }

        .card-body {
            padding: var(--space-lg);
        }

        .card-accent {
            height: 4px;
            background-color: var(--color-tertiary);
            width: 100%;
        }

        .pointed-arch-img {
            width: 100%;
            height: 200px;
            background-color: var(--color-stone-dark);
            /* Pointed Arch Clip Path */
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 50% 100%, 85% 0%, 85% 15%, 100% 15%, 100% 100%, 0% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--color-neutral);
            margin-bottom: var(--space-md);
        }
        
        .pointed-arch-img svg {
            width: 60px;
            height: 60px;
            fill: var(--color-muted);
            margin-top: 40px;
        }

        /* FORM */
        .form-group {
            margin-bottom: var(--space-lg);
            max-width: 600px;
        }

        .form-label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: var(--space-sm);
            color: var(--color-secondary);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            font-family: 'Libre Baskerville', serif;
            font-size: 1rem;
            background-color: var(--color-primary);
            border: var(--border-thick);
            color: var(--color-neutral);
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--color-tertiary);
            box-shadow: inset 0 0 0 2px var(--color-tertiary);
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%232C2C2C' stroke-width='2'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        /* SVG Icons */
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            stroke-width: 0;
            stroke: currentColor;
            fill: currentColor;
            vertical-align: middle;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .grid-12 { grid-template-columns: 1fr; }
            .metric-card { grid-column: span 1; }
            .palette-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-inner { flex-direction: column; gap: var(--space-md); }
        }
    </style>
</head>
