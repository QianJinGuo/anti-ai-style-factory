<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankara Production Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM TOKENS --- */
        :root {
            /* Colors */
            --color-primary: #D94F28; /* Deep Ochre/Red */
            --color-secondary: #F4D03F; /* Saffron Yellow */
            --color-tertiary: #2E8B57; /* Forest Green */
            --color-neutral: #1A1A1A; /* Charcoal Black */
            --color-muted: #E8E4D9; /* Raw Cotton */
            --color-white: #FFFFFF;

            /* Spacing */
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 48px;

            /* Typography */
            --font-head: 'Oswald', sans-serif;
            --font-body: 'Source Sans 3', sans-serif;

            /* Shapes */
            --radius-none: 0px;
            --shadow-hard: 6px 6px 0px var(--color-neutral);
            --shadow-hover: 0px 0px 0px var(--color-neutral);
        }

        /* --- RESET & BASE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-muted);
            /* Subtle geometric pattern mimicking fabric weave */
            background-image: 
                linear-gradient(45deg, var(--color-neutral) 25%, transparent 25%, transparent 75%, var(--color-neutral) 75%, var(--color-neutral)),
                linear-gradient(45deg, var(--color-neutral) 25%, transparent 25%, transparent 75%, var(--color-neutral) 75%, var(--color-neutral));
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-blend-mode: overlay;
            opacity: 0.98;
            
            font-family: var(--font-body);
            color: var(--color-neutral);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 {
            font-family: var(--font-head);
            text-transform: uppercase;
            color: var(--color-neutral);
            line-height: 1.1;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: var(--space-md);
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: var(--space-sm);
        }

        p {
            margin-bottom: var(--space-md);
        }

        .caption {
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-neutral);
        }

        /* --- LAYOUT UTILITIES --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }

        .grid-12 {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--space-lg);
        }

        .section-block {
            margin-bottom: var(--space-xl);
            position: relative;
        }

        /* Decorative Kente-style strip top border */
        .section-block::before {
            content: '';
            display: block;
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--color-primary),
                var(--color-primary) 20px,
                var(--color-secondary) 20px,
                var(--color-secondary) 40px,
                var(--color-tertiary) 40px,
                var(--color-tertiary) 60px
            );
            margin-bottom: var(--space-lg);
            border-bottom: 2px solid var(--color-neutral);
        }

        /* --- COMPONENTS: BUTTONS --- */
        .btn {
            display: inline-block;
            font-family: var(--font-head);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 24px;
            text-decoration: none;
            cursor: pointer;
            border: 2px solid var(--color-neutral);
            border-radius: var(--radius-none);
            box-shadow: var(--shadow-hard);
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            left: 0;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-white);
        }

        .btn-secondary {
            background-color: var(--color-secondary);
            color: var(--color-neutral);
        }

        .btn-tertiary {
            background-color: var(--color-tertiary);
            color: var(--color-white);
        }

        .btn:active {
            box-shadow: var(--shadow-hover);
            transform: translate(4px, 4px);
        }

        /* --- COMPONENTS: CARDS --- */
        .card {
            background-color: var(--color-white);
            border: 3px solid var(--color-neutral);
            border-radius: var(--radius-none);
            box-shadow: var(--shadow-hard);
            padding: var(--space-lg);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: var(--color-secondary);
            margin: -var(--space-lg) -var(--space-lg) var(--space-lg) -var(--space-lg);
            padding: var(--space-md);
            border-bottom: 3px solid var(--color-neutral);
        }

        /* --- SECTION 1: NAV --- */
        .nav-bar {
            background-color: var(--color-neutral);
            color: var(--color-white);
            padding: var(--space-md) 0;
            border-bottom: 4px solid var(--color-primary);
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: var(--font-head);
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--color-secondary);
            letter-spacing: 0.05em;
        }

        .nav-links {
            display: flex;
            gap: var(--space-xl);
        }

        .nav-link {
            color: var(--color-muted);
            text-decoration: none;
            font-family: var(--font-head);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--color-secondary);
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 6px;
        }

        /* --- SECTION 2: HERO --- */
        .hero-section {
            padding-top: var(--space-xl);
            padding-bottom: var(--space-xl);
            background-color: var(--color-primary);
            border-bottom: 4px solid var(--color-neutral);
            position: relative;
        }

        .hero-content {
            border: 4px solid var(--color-neutral);
            padding: var(--space-xl);
            background-color: var(--color-white);
            box-shadow: var(--shadow-hard);
            max-width: 800px;
        }

        .hero-meta {
            margin-top: var(--space-md);
            font-family: var(--font-body);
            font-weight: 600;
            color: var(--color-neutral);
        }

        /* --- SECTION 3: DASHBOARD --- */
        .metric-card {
            grid-column: span 4;
        }

        .metric-value {
            font-family: var(--font-head);
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: var(--space-sm);
            text-shadow: 2px 2px 0px var(--color-neutral);
        }

        .data-table-container {
            grid-column: span 12;
            background-color: var(--color-white);
            border: 3px solid var(--color-neutral);
            box-shadow: var(--shadow-hard);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-body);
        }

        thead {
            background-color: var(--color-secondary);
            border-bottom: 3px solid var(--color-neutral);
        }

        th {
            text-align: left;
            padding: var(--space-md);
            font-family: var(--font-head);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-neutral);
        }

        td {
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-neutral);
            border-right: 1px solid var(--color-neutral);
        }

        td:last-child {
            border-right: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: var(--color-muted);
        }

        tr:nth-child(odd) {
            background-color: var(--color-white);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid var(--color-neutral);
        }
        .status-active { background-color: var(--color-tertiary); color: white; }
        .status-pending { background-color: var(--color-secondary); color: black; }
        .status-low { background-color: var(--color-primary); color: white; }

        /* --- SECTION 4: PALETTE --- */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-lg);
        }

        .swatch {
            height: 150px;
            border: 3px solid var(--color-neutral);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-sm);
            box-shadow: 4px 4px 0px var(--color-neutral);
            position: relative;
        }

        .swatch-info {
            background-color: var(--color-white);
            border: 1px solid var(--color-neutral);
            padding: 4px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* --- SECTION 5: COMPONENTS --- */
        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-lg);
        }

        /* --- SECTION 6: FORM --- */
        .form-container {
            background-color: var(--color-white);
            border: 3px solid var(--color-neutral);
            box-shadow: var(--shadow-hard);
            padding: var(--space-xl);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-label {
            display: block;
            font-family: var(--font-head);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: var(--space-sm);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            border: 2px solid var(--color-neutral);
            border-radius: var(--radius-none);
            background-color: var(--color-muted);
            color: var(--color-neutral);
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            background-color: var(--color-white);
            box-shadow: 4px 4px 0px var(--color-primary);
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231A1A1A%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
            padding-right: 2.5rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .grid-12 {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 2rem; }
            .nav-links { display: none; } /* Simplified for reference */
        }
    </style>
</head>
<body>

    <!-- 1. NAVIGATION -->
    <nav class="nav-bar">
        <div class="container nav-inner">
            <div class="nav-logo">
                <span style="color: var(--color-primary);">///</span> Ankara<span style="color: var(--color-secondary);">_Sys</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Dashboard</a>
                <a href="#" class="nav-link">Inventory</a>
                <a href="#" class="nav-link">Production</a>
                <a href="#" class="nav-link">Orders</a>
            </div>
        </div>
    </nav>

    <!-- 2. HERO SECTION -->
    <header class="hero-section">
        <div class="container">
            <div class="hero-content">
