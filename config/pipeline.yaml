# Anti-AI Style Factory — Configuration
# =======================================

# LLM Provider — switch by changing `provider`. Each entry under `providers`
# carries its own base_url + the env var that holds the API key.
# Set the API key in .env file or as an environment variable.
llm:
  provider: openai             # openai | xfyun | any OpenAI-compatible API
  model: "gpt-4o-mini"
  max_tokens: 4096
  temperature: 0.7
  providers:
    openai:
      base_url: "https://api.openai.com/v1"
      api_key_env: "OPENAI_API_KEY"
    xfyun:
      base_url: "https://maas-api.cn-huabei-1.xf-yun.com/v2"
      api_key_env: "XFYUN_API_KEY"

# Scoring thresholds
scoring:
  eight_dim_max: 4      # 8-dim rubric must be ≤ this to pass
  max_iterations: 3      # max LLM retries per style before giving up

# Style generation targets
pipeline:
  # Which tiers to generate (in order)
  tier_order: [1, 2, 3, 4]
  # Scenarios to generate per style (each becomes a section in reference.html)
  scenarios:
    - dashboard
    - landing
    - article
    - slide
  # Parallel LLM calls
  concurrency: 1         # sequential by default; bump if rate limit allows
  # Output
  output_dir: "./styles"
  log_dir: "./logs"

# Style seeds (auto-loaded from catalog/SEEDS.md, but can override here)
seeds_override: {}
